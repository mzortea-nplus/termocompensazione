# ─────────────────────────────────────────────
#  Regression Model – Configuration
# ─────────────────────────────────────────────

data:
  files:
    - "C:/Users/m.zortea/Documents/timeseries_etl/data/sommacampagna/csv_est/*.parquet"
    - "C:/Users/m.zortea/Documents/timeseries_etl/data/sommacampagna/csv_incl/*.parquet"
    - "C:/Users/m.zortea/Documents/timeseries_etl/data/sommacampagna/csv_spost/*.parquet"
    - "C:/Users/m.zortea/Documents/timeseries_etl/data/sommacampagna/csv_temp/*.parquet"

  time_column: "time"
  tmp_suffix: "_t"
  exclude_columns:
    - "dt"
    - "time"
    - "month"
    - "hour"
    - "datetime"

# Time window for SELECT from view (only one style used)
# Use s3://bucket/prefix/*.parquet in data.files for S3
query:
  last_n_days: 7
  # start_time: null
  # end_time: null

debug_mode: true

algorithms:
  - algorithm: "MLR"
    params:
      lag_time: "15min"
      max_lag: "48h"

output:
  show_plots: false
  save_plots: true
  plot_dir: "output/plots"
  results_path: "output/results.parquet"
