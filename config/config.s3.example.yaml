# Example config for data in AWS S3.
# Copy to config/config.yaml or pass as: python run_pipeline.py config/config.s3.yaml
#
# AWS credentials: set here (key/secret as parameters) and/or pass via CLI:
#   python run_pipeline.py --aws-access-key-id KEY --aws-secret-access-key SECRET [--aws-region REGION]
# CLI overrides config. If neither is set, env vars (AWS_ACCESS_KEY_ID etc.) are used.

# aws:
#   access_key_id: "YOUR_ACCESS_KEY"
#   secret_access_key: "YOUR_SECRET_KEY"
#   region: "eu-west-1"

data:
  files:
    - "s3://YOUR-BUCKET/your-prefix/csv_est/*.parquet"
    - "s3://YOUR-BUCKET/your-prefix/csv_incl/*.parquet"
    - "s3://YOUR-BUCKET/your-prefix/csv_spost/*.parquet"
    - "s3://YOUR-BUCKET/your-prefix/csv_temp/*.parquet"
  time_column: "time"
  tmp_suffix: "_t"
  exclude_columns:
    - "dt"
    - "time"
    - "month"
    - "hour"
    - "datetime"

query:
  last_n_days: 7

debug_mode: true

algorithms:
  - algorithm: "MLR"
    params:
      lag_time: "15min"
      max_lag: "48h"

output:
  show_plots: false
  save_plots: true
  plot_dir: "output/plots"
  results_path: "output/results.parquet"
